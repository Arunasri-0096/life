<!DOCTYPE html>
<html>
<head>
    <title>Color Message</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-size: 40px;
            font-family: Arial, sans-serif;
        }
        .life { color: blue; }
        .without { color: black; }
        .f { color: red; font-weight: bold; }
        .lie { color: green; }
    </style>
</head>
<body>
    <p>
        in <span class="life">LIFE</span> 
        <span class="without">without</span> 
        <span class="f">F</span> 
        <span class="life">LIFE</span> 
        <span class="lie">IS LIE</span>
    </p>
</body>
</html>
